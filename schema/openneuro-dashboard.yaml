id: https://w3id.org/openneuro-dashboard
name: openneuro-dashboard
title: OpenNeuro Dashboard Data Model
description: >-
  Data model for tracking OpenNeuro datasets and their synchronization status
  across GraphQL API, GitHub mirrors, and S3 exports.
version: 1.0.0
license: https://creativecommons.org/publicdomain/zero/1.0/

prefixes:
  linkml: https://w3id.org/linkml/
  openneuro: https://w3id.org/openneuro-dashboard/

default_prefix: openneuro
default_range: string

imports:
  - linkml:types

classes:
  DatasetsRegistry:
    description: >-
      Registry of all datasets with their latest snapshot tags.
      Source of truth from OpenNeuro GraphQL API.
    attributes:
      lastChecked:
        range: datetime
        required: true
        description: When the GraphQL API was last queried
      totalCount:
        range: integer
        required: true
        description: Total number of public datasets
      latestSnapshots:
        range: SnapshotMapping
        required: true
        description: Map of dataset IDs to their latest snapshot tags
        multivalued: false
        inlined: true

  SnapshotMapping:
    description: Map from dataset ID to snapshot tag
    attributes:
      dataset_id:
        range: string
        description: Dataset identifier (key in the map)
        pattern: "^ds[0-9]{6}$"
      snapshot_tag:
        range: string
        description: Snapshot version tag (value in the map)

  AllDatasetsSummary:
    description: >-
      Pre-computed check summaries for all datasets.
      Generated by SUMMARIZE process.
    attributes:
      lastUpdated:
        range: datetime
        required: true
        description: When this summary was last computed
      datasets:
        range: DatasetSummary
        required: true
        multivalued: true
        inlined_as_list: true

  DatasetSummary:
    description: Summary of check results for a single dataset
    attributes:
      id:
        range: string
        required: true
        identifier: true
        pattern: "^ds[0-9]{6}$"
      status:
        range: CheckStatus
        required: true
        description: Overall dataset health status
      checks:
        range: CheckResults
        required: true
        inlined: true
      lastChecked:
        range: CheckTimestamps
        required: false
        inlined: true
        description: Timestamps for individual checks

  CheckResults:
    description: Status of individual checks
    attributes:
      github:
        range: CheckStatus
        required: true
      s3Version:
        range: CheckStatus
        required: true
      s3Files:
        range: CheckStatus
        required: true

  CheckTimestamps:
    description: Last check time for each verification
    attributes:
      github:
        range: datetime
        required: false
      s3Version:
        range: datetime
        required: false
      s3Files:
        range: datetime
        required: false

  SnapshotIndex:
    description: Index of all snapshot tags for a dataset, sorted by creation time
    attributes:
      tags:
        range: string
        required: true
        multivalued: true
        inlined_as_list: true
        description: List of snapshot tags in chronological order

  GitHubStatus:
    description: Status of GitHub mirror from git ls-remote
    attributes:
      lastChecked:
        range: datetime
        required: true
      head:
        range: string
        required: true
        description: Name of the branch HEAD points to (e.g., "master")
      branches:
        range: GitRefMapping
        required: true
        inlined: true
        description: Map of branch names to commit SHAs
      tags:
        range: GitRefMapping
        required: true
        inlined: true
        description: Map of tag names to commit SHAs

  GitRefMapping:
    description: Map from ref name to commit SHA
    attributes:
      ref_name:
        range: string
        description: Branch or tag name (key)
      commit_sha:
        range: string
        description: Git commit SHA (value)
        pattern: "^[0-9a-f]{40}$"

  S3Version:
    description: Version extracted from dataset_description.json on S3
    attributes:
      lastChecked:
        range: datetime
        required: true
      datasetDescriptionDOI:
        range: string
        required: true
        description: Full DOI from DatasetDOI field
        pattern: "^10\\.18112/openneuro\\.ds[0-9]{6}\\.v.*$"
      extractedVersion:
        range: string
        required: true
        description: Version string extracted from DOI

  S3FileDiff:
    description: >-
      Comparison between S3 file listing and git tree.
      Only created when S3 version matches latest snapshot.
    attributes:
      lastChecked:
        range: datetime
        required: true
      s3Version:
        range: string
        required: true
        description: Version tag that S3 claims to contain
      gitHexsha:
        range: string
        required: true
        description: Git commit SHA used for comparison
        pattern: "^[0-9a-f]{40}$"
      summary:
        range: DiffSummary
        required: true
        inlined: true
      inGitOnly:
        range: string
        required: true
        multivalued: true
        inlined_as_list: true
        description: Files present in git but missing from S3
      inS3Only:
        range: string
        required: true
        multivalued: true
        inlined_as_list: true
        description: Files present in S3 but not in git

  DiffSummary:
    description: Summary counts for file comparison
    attributes:
      totalInGit:
        range: integer
        required: true
      totalInS3:
        range: integer
        required: true
      inBoth:
        range: integer
        required: true
      inGitOnly:
        range: integer
        required: true
      inS3Only:
        range: integer
        required: true

  SnapshotMetadata:
    description: >-
      Immutable metadata about a snapshot from GraphQL.
      Written once when snapshot is discovered.
    attributes:
      hexsha:
        range: string
        required: true
        description: Git commit SHA for this snapshot
        pattern: "^[0-9a-f]{40}$"
      created:
        range: datetime
        required: true
        description: When this snapshot was published

  FileList:
    description: >-
      Complete file listing from git tree.
      Immutable once created for a tag.
    attributes:
      count:
        range: integer
        required: true
        description: Total number of files
      files:
        range: string
        required: true
        multivalued: true
        inlined_as_list: true
        description: Sorted list of file paths

enums:
  CheckStatus:
    description: Status of a check
    permissible_values:
      ok:
        description: Check passed successfully
      warning:
        description: Check passed but with warnings
      error:
        description: Check failed
      version-mismatch:
        description: S3 version does not match expected version
      pending:
        description: Check has not yet been run or completed

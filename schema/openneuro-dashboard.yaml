id: https://w3id.org/openneuro-dashboard
name: openneuro-dashboard
title: OpenNeuro Dashboard Data Model
description: >-
  Data model for tracking OpenNeuro datasets and their synchronization status
  across GraphQL API, GitHub mirrors, and S3 exports.
version: 2.0.0
license: https://creativecommons.org/publicdomain/zero/1.0/

prefixes:
  linkml: https://w3id.org/linkml/
  openneuro: https://w3id.org/openneuro-dashboard/

default_prefix: openneuro
default_range: string

imports:
  - linkml:types

classes:
  DatasetsRegistry:
    description: >-
      Registry of all datasets with their latest snapshot tags.
      Source of truth from OpenNeuro GraphQL API.
    attributes:
      lastChecked:
        range: datetime
        required: true
        description: When the GraphQL API was last queried
      totalCount:
        range: integer
        required: true
        description: Total number of public datasets
      latestSnapshots:
        range: SnapshotMapping
        required: true
        description: Map of dataset IDs to their latest snapshot tags
        multivalued: false
        inlined: true

  SnapshotMapping:
    description: Map from dataset ID to snapshot tag
    attributes:
      dataset_id:
        range: string
        description: Dataset identifier (key in the map)
        pattern: "^ds[0-9]{6}$"
      snapshot_tag:
        range: string
        description: Snapshot version tag (value in the map)

  AllDatasetsSummary:
    description: >-
      Pre-computed check summaries for all datasets.
      Generated by SUMMARIZE process.
    attributes:
      lastUpdated:
        range: datetime
        required: true
        description: When this summary was last computed
      datasets:
        range: DatasetSummary
        required: true
        multivalued: true
        inlined_as_list: true

  IssueSubtypes:
    description: Per-check issue subtype for filtering and display
    attributes:
      github:
        range: GithubIssueSubtype
        required: false
        description: Specific GitHub issue type (null if ok/pending)
      s3Version:
        range: S3VersionIssueSubtype
        required: false
        description: Specific S3 version issue type (null if ok/pending)
      s3Files:
        range: S3FilesIssueSubtype
        required: false
        description: Specific S3 files issue type (null if ok/pending)

  DatasetSummary:
    description: Summary of check results for a single dataset
    attributes:
      id:
        range: string
        required: true
        identifier: true
        pattern: "^ds[0-9]{6}$"
      status:
        range: CheckStatus
        required: true
        description: Overall dataset health status
      checks:
        range: CheckResults
        required: true
        inlined: true
      s3Blocked:
        range: boolean
        required: false
        description: >-
          True if S3 checks are blocked by 403 (access denied).
          When true, both s3Version and s3Files will show error status
          with lock icons in the dashboard.
      lastChecked:
        range: CheckTimestamps
        required: false
        inlined: true
        description: Timestamps for individual checks
      s3FilesAdded:
        range: integer
        required: false
        description: Count of files in git but not S3 (null if no diff or pending)
      s3FilesRemoved:
        range: integer
        required: false
        description: Count of files in S3 but not git (null if no diff or pending)
      issueSubtypes:
        range: IssueSubtypes
        required: false
        inlined: true
        description: Per-check issue subtypes for dashboard filtering
      githubVersion:
        range: string
        required: false
        description: Discovered version from GitHub mirror (latest tag found, or null)
      s3Version:
        range: string
        required: false
        description: Discovered version from S3 DOI extraction (or null)
      latestSnapshotDate:
        range: datetime
        description: Creation date of the latest snapshot (for display and sorting)

  CheckResults:
    description: Status of individual checks
    attributes:
      github:
        range: CheckStatus
        required: true
      s3Version:
        range: CheckStatus
        required: true
      s3Files:
        range: CheckStatus
        required: true

  CheckTimestamps:
    description: Last check time for each verification
    attributes:
      github:
        range: datetime
        required: false
      s3Version:
        range: datetime
        required: false
      s3Files:
        range: datetime
        required: false

  SnapshotIndex:
    description: Index of all snapshot tags for a dataset, sorted by creation time
    attributes:
      tags:
        range: string
        required: true
        multivalued: true
        inlined_as_list: true
        description: List of snapshot tags in chronological order

  GitHubStatus:
    description: Status of GitHub mirror from git ls-remote
    attributes:
      lastChecked:
        range: datetime
        required: false
      head:
        range: string
        description: Name of the branch HEAD points to (e.g., "master")
      branches:
        range: GitRefMapping
        required: true
        inlined: true
        description: Map of branch names to commit SHAs
      tags:
        range: GitRefMapping
        required: true
        inlined: true
        description: Map of tag names to commit SHAs
      error:
        range: string
        description: Error condition if check failed (repo-not-found, repo-empty, command-failed)

  GitRefMapping:
    description: Map from ref name to commit SHA
    attributes:
      ref_name:
        range: string
        description: Branch or tag name (key)
      commit_sha:
        range: string
        description: Git commit SHA (value)
        pattern: "^[0-9a-f]{40}$"

  S3Version:
    description: >-
      Version information from S3's dataset_description.json.
      Determines which git tree to compare against for file validation.
    attributes:
      schemaVersion:
        range: string
        required: true
        description: Version of the schema used for this file
        pattern: "^[0-9]+\\.[0-9]+\\.[0-9]+$"
      lastChecked:
        range: datetime
        required: false
      accessible:
        range: boolean
        required: true
        description: >-
          Whether S3 files are accessible. False only for 403 (access denied).
          If false, no file validation can be performed.
      httpStatus:
        range: integer
        required: false
        description: HTTP status code (only present for blocking errors like 403)
      datasetDescriptionDOI:
        range: string
        required: false
        description: >-
          Full DOI from DatasetDOI field. Null if missing, inaccessible,
          or error occurred.
      extractedVersion:
        range: string
        required: false
        description: >-
          Version to use for file comparison. Either extracted from DOI
          or assumed to be latest snapshot. Null only if inaccessible (403).
      versionSource:
        range: VersionSource
        required: false
        description: How the version was determined
      datasetDescriptionMissing:
        range: boolean
        required: false
        description: True if dataset_description.json returned 404
      doiIdMismatch:
        range: boolean
        required: false
        description: True if DOI contains wrong dataset ID
      doiDatasetId:
        range: string
        required: false
        description: Dataset ID from DOI (if different from actual)
        pattern: "^ds[0-9]{6}$"
      invalidJson:
        range: boolean
        required: false
        description: True if dataset_description.json contained invalid JSON
      httpError:
        range: integer
        required: false
        description: HTTP status code for non-blocking errors
      requestError:
        range: string
        required: false
        description: Network request error message
      unexpectedError:
        range: string
        required: false
        description: Other unexpected error message

  S3FileDiff:
    description: >-
      Comparison between S3 file listing and git tree.
      Only created when S3 is accessible (not 403).
      Diff semantics: "what needs to happen to bring S3 into sync with git."
    attributes:
      schemaVersion:
        range: string
        required: true
        description: Version of the schema used for this file
        pattern: "^[0-9]+\\.[0-9]+\\.[0-9]+$"
      datasetId:
        range: string
        required: true
        pattern: "^ds[0-9]{6}$"
      snapshotTag:
        range: string
        required: true
        description: Git tag compared against
      s3Version:
        range: string
        required: true
        description: Version tag that S3 was compared against
      checkedAt:
        range: datetime
        required: false
        description: When this comparison was performed
      status:
        range: CheckStatus
        required: true
        description: "ok if no differences, error if any"
      exportMissing:
        range: boolean
        required: false
        description: >-
          True if S3 has zero files (entire export is missing).
          When true, added, removed, and context will be empty arrays.
      totalS3Files:
        range: integer
        required: true
        description: Total number of files found in S3
      totalGitFiles:
        range: integer
        required: true
        description: Total number of files in the git tree
      added:
        range: string
        required: true
        multivalued: true
        inlined_as_list: true
        description: >-
          Files in git but not S3 (S3 needs these).
          Sorted for deterministic output.
      removed:
        range: string
        required: true
        multivalued: true
        inlined_as_list: true
        description: >-
          Files in S3 but not git (orphaned in S3).
          Sorted for deterministic output.
      context:
        range: string
        required: true
        multivalued: true
        inlined_as_list: true
        description: >-
          Neighboring files from the git tree within 3 sorted positions
          of any added/removed file. Used to reconstruct a unified diff
          view with context. Sorted for deterministic output.

  SnapshotMetadata:
    description: >-
      Immutable metadata about a snapshot from GraphQL.
      Written once when snapshot is discovered.
    attributes:
      hexsha:
        range: string
        required: true
        description: Git commit SHA for this snapshot
        pattern: "^[0-9a-f]{40}$"
      created:
        range: datetime
        required: true
        description: When this snapshot was published

  FileList:
    description: >-
      Complete file listing from git tree.
      Immutable once created for a tag.
    attributes:
      count:
        range: integer
        required: true
        description: Total number of files
      files:
        range: string
        required: true
        multivalued: true
        inlined_as_list: true
        description: Sorted list of file paths

enums:
  CheckStatus:
    description: Status of a check
    permissible_values:
      ok:
        description: Check passed successfully
      warning:
        description: Check passed but with warnings
      error:
        description: Check failed
      version-mismatch:
        description: S3 version does not match expected version
      pending:
        description: Check has not yet been run or completed
  VersionSource:
    description: How the S3 version was determined
    permissible_values:
      doi:
        description: Extracted from standard OpenNeuro DOI pattern
      assumed_latest:
        description: >-
          Could not extract from DOI (missing, custom format, or error).
          Using latest snapshot for comparison.

  GithubIssueSubtype:
    description: Specific issue type for GitHub mirror checks
    permissible_values:
      tag-missing:
        description: Latest snapshot tag not found on GitHub mirror
      head-mismatch:
        description: HEAD points to different commit than latest tag
      repo-not-found:
        description: GitHub repository does not exist
      repo-empty:
        description: Repository exists but has no refs pushed

  S3VersionIssueSubtype:
    description: Specific issue type for S3 version checks
    permissible_values:
      doi-mismatch:
        description: DOI version does not match latest snapshot
      no-doi:
        description: DOI field missing or unparseable; version assumed from latest snapshot
      blocked:
        description: S3 returned 403 (access denied)

  S3FilesIssueSubtype:
    description: Specific issue type for S3 file diff checks
    permissible_values:
      files-missing:
        description: Files exist in git but not in S3
      files-orphaned:
        description: Files exist in S3 but not in git
      export-missing:
        description: S3 has zero files (entire export missing)
